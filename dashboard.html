<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase - Admin Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" id="pageStylesheet" href="">
</head>
<body>
    <div class="dashboard-container" style="display: flex; width: 100%; height: 100vh;">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-parking"></i>
                    <span>ParkEase</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="park-in">
                    <i class="fas fa-plus-circle"></i>
                    <span>Park-In</span>
                </a>
                <a href="#" class="nav-item" data-page="park-out">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Park-Out</span>
                </a>
                <a href="#" class="nav-item" data-page="slots">
                    <i class="fas fa-square-parking"></i>
                    <span>Parking Slots</span>
                </a>
                <a href="#" class="nav-item" data-page="transactions">
                    <i class="fas fa-receipt"></i>
                    <span>Transaction Logs</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="nav-item logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                </div>

                <div class="header-right">
                </div>
            </header>

            <!-- Page Content Container -->
            <div class="content-wrapper" id="contentWrapper">
                <!-- Content will be loaded dynamically here -->
                <div class="loading-message">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer" class="notification-container"></div>

    <script src="dashboard.js"></script>
</body>
</html>
